# Trading Symbols Configuration
# Only enabled symbols are analyzed.
# pip_size / pip_value_per_lot are CONTRACT-SPECIFIC — verify against YOUR broker before live.
#   pip_value_per_lot = money (account currency) gained per 1.0 lot per 1 pip/point move.
#   lots = risk_amount / (stop_distance_in_pips * pip_value_per_lot)

symbols:
  EURUSD:
    enabled: true
    asset_class: "forex"
    broker_symbol: "EURUSD"       # exact MT5 symbol (broker-dependent)
    oanda_symbol: "EUR_USD"
    correlation_pair: "DXY"
    news_currencies: ["EUR", "USD"]
    news_blackout_minutes: 60     # block this many min before a high-impact event (industry standard 30-60 min)
    timeframes: [MN, W1, D1, H4, H1, M15, M5, M1]
    digits: 5
    pip_size: 0.0001              # 1 pip
    pip_value_per_lot: 10.0       # USD per pip per 1.0 lot (standard EURUSD, USD account)
    min_lot: 0.01
    lot_step: 0.01
    max_lot: 50.0
    min_stop_pips: 8              # tighter than this = BLOCKED (noise/spread)
    sessions: [ny_am_silver_bullet, london_open]

  NAS100:
    enabled: true
    asset_class: "index_cfd"
    broker_symbol: "US100.cash"   # may be USTEC / US100 / NDX depending on broker — CONFIRM
    oanda_symbol: "NAS100_USD"
    correlation_pair: "US500"
    news_currencies: ["USD"]      # index reacts to US macro (FOMC, NFP, CPI)
    news_blackout_minutes: 60     # indices: shorter pre-event window
    timeframes: [MN, W1, D1, H4, H1, M15, M5, M1]
    digits: 1
    pip_size: 1.0                 # 1 index point
    pip_value_per_lot: 1.0        # USD per point per 1.0 lot — VERIFY broker contract spec!
    min_lot: 0.01
    lot_step: 0.01
    max_lot: 20.0
    min_stop_pips: 30             # index points
    sessions: [ny_am_silver_bullet, ny_pm_silver_bullet]

  NZDUSD:
    enabled: true
    asset_class: "forex"
    broker_symbol: "NZDUSD"
    oanda_symbol: "NZD_USD"
    correlation_pair: "DXY"
    news_currencies: ["NZD", "USD"]
    news_blackout_minutes: 60
    timeframes: [MN, W1, D1, H4, H1, M15, M5, M1]
    digits: 5
    pip_size: 0.0001
    pip_value_per_lot: 10.0
    min_lot: 0.01
    lot_step: 0.01
    max_lot: 50.0
    min_stop_pips: 8
    sessions: [ny_am_silver_bullet, london_open]

  GBPUSD:
    enabled: false
    asset_class: "forex"
    broker_symbol: "GBPUSD"
    oanda_symbol: "GBP_USD"
    correlation_pair: "DXY"
    news_currencies: ["GBP", "USD"]
    timeframes: [MN, W1, D1, H4, H1, M15, M5, M1]
    digits: 5
    pip_size: 0.0001
    pip_value_per_lot: 10.0
    min_lot: 0.01
    lot_step: 0.01
    max_lot: 50.0
    min_stop_pips: 8
    sessions: [ny_am_silver_bullet, london_open]
