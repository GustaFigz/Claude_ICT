# Account Configuration — FTMO Challenge
# Copy this to account.yaml and fill in your values (account.yaml is gitignored).
# Numbers below reflect FTMO 2026 rules (verified 2026-05). Edit per your real account.

account:
  # Challenge Type: "2-step" (standard) or "1-step"
  # 2-step: 5% daily / 10% total (STATIC), targets 10% (phase1) then 5% (phase2), min 4 days/phase
  # 1-step: 3% daily / 10% total (TRAILING), target 10%, min 4 days
  challenge_type: "2-step"

  # Capital and currency
  initial_capital: 10000
  account_currency: "USD"

  # FTMO limits (official) and conservative internal buffers (when YOU stop)
  daily_loss_limit_pct: 5.0      # official (2-step). 1-step = 3.0
  daily_buffer_pct: 3.5          # stop trading for the day if reached
  max_total_loss_pct: 10.0       # official
  max_total_buffer_pct: 8.0      # pause system if reached
  trailing_max_loss: false       # true only for 1-step (max loss trails equity high)

  # Targets / days
  profit_target_pct: 10.0        # phase 1 (2-step). phase 2 target = 5.0
  minimum_trading_days: 4        # FTMO 2026: 4 days per phase (was 10)

  # Risk per trade
  risk_per_trade_pct: 0.50       # default 0.5% of account per trade
  max_risk_per_trade_pct: 1.0
  min_rr_ratio: 2.0              # hard floor: R:R below this blocks trade
  min_rr_ratio_warn: 1.5         # warn zone: R:R in [1.5–2.0) shows as AGUARDAR, not BLOCKED

  # Session rules
  max_trades_per_day: 3
  max_consecutive_losses: 3      # stop after N losing trades in a day (3 × 0.5% = 1.5% max loss)

  # Setup filtering
  min_confluence: 2              # minimum confluence score to show a setup (was hardcoded 3)

  # Timezones
  timezone: "America/New_York"   # canonical trading time (Kill Zones)
  ft_timezone: "Europe/Lisbon"   # your reference timezone
  ftmo_rollover_tz: "Europe/Prague"  # CE(S)T — FTMO daily reset at 00:00

# Per-symbol risk overrides (optional)
risk_overrides: {}

# Connectivity
connectivity:
  primary_broker: "mt5"          # decisive price/account source for FTMO
  secondary_data_source: "oanda" # sanity check only
  calendar_source: "forexfactory"

# Modes
demo_mode: true
shadow_mode: false
data_mode: "fixtures"            # "fixtures" | "oanda" | "mt5" (current build: fixtures)
